<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> User </title>
    <link rel="stylesheet" href="../css/user.css?v=1">
</head>

<body>

    <div style="display:flex;justify-content:space-between;align-items:center;">
        <h1>User</h1>
        <div id="authControls">
            <a id="loginLink" href="../login.html" style="margin-right:12px;display:none;">Login</a>
            <a id="logoutLink" href="#" style="display:none;">Logout</a>
        </div>
    </div>

    <h3>Add New User</h3>
    <form id="addUserForm" action="javascript:void(0);" method="POST" onsubmit="addItem()">
        <label for="add-name">User Name:</label>
        <input type="text" id="add-name" placeholder="New user" required>
        <label for="add-age">Age:</label>
        <input type="number" id="add-age" required>
        <label for="add-gender">Gender:</label>
        <select id="add-gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <!-- ← NEW: Add password field -->
        <label for="add-password">Password:</label>
        <input type="password" id="add-password" required>
        <input type="submit" value="Add User">
    </form>

    <div id="editForm">
        <h3>Edit User</h3>
        <form action="javascript:void(0);" onsubmit="updateItem()">
            <input id="edit-id" type="hidden">
            <label for="edit-name">Name:</label>
            <input type="text" id="edit-name" required>
            <label for="edit-age">Age:</label>
            <input type="number" id="edit-age" required>
            <label for="edit-gender">Gender:</label>
            <select id="edit-gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <!-- ← NEW: Add password field for editing -->
            <label for="edit-password">Password:</label>
            <input type="password" id="edit-password" required>
            <input type="submit" value="Save Changes">
            <a onclick="closeInput()" aria-label="Close">&#10006;</a>
        </form>
    </div>

    <p id="counter"></p>

    <table>
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Actions</th>
        </tr>
        <tbody id="user"></tbody>
    </table>

    <a href="../index.html">go to TenBis</a>

    <script src="../js/users.js?v=1"></script>
    <script type="text/javascript">
        // authentication controls (login/logout)
        const username = (function(){
            const token = localStorage.getItem('token');
            if (!token) return null;
            try { return JSON.parse(atob(token.split('.')[1])).username; } catch(e){ return null; }
        })();
        const loginLink = document.getElementById('loginLink');
        const logoutLink = document.getElementById('logoutLink');
        if (username) {
            loginLink.style.display = 'none';
            logoutLink.style.display = 'inline';
        } else {
            loginLink.style.display = 'inline';
            logoutLink.style.display = 'none';
        }
        logoutLink.addEventListener('click', function(e){ e.preventDefault(); localStorage.removeItem('token'); window.location.href = '../login.html'; });

        if (!localStorage.getItem('token')) {
            window.location.href = '../login.html';
        } else {
            getItems();
        }
    </script>

</body>

</html>
